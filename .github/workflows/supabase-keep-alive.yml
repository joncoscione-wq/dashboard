name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 8 */4 * *'   # cada 4 días a las 8:00 UTC
  workflow_dispatch:          # permite correrlo manualmente desde GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/empleados?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")

          echo "HTTP status: $STATUS"

          if [ "$STATUS" != "200" ]; then
            echo "Error: respuesta inesperada ($STATUS)"
            exit 1
          fi

          echo "Supabase activo."
