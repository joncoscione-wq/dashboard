name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 8 */4 * *'   # cada 4 días a las 8:00 UTC
  workflow_dispatch:          # permite correrlo manualmente desde GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Verificar secrets
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "ERROR: SUPABASE_URL está vacío"
            exit 1
          fi
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "ERROR: SUPABASE_ANON_KEY está vacío"
            exit 1
          fi
          echo "Secrets OK — URL: ${SUPABASE_URL:0:30}..."
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/empleados?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")

          echo "HTTP status: $STATUS"

          if [ "$STATUS" != "200" ]; then
            echo "Error: respuesta inesperada ($STATUS)"
            exit 1
          fi

          echo "Supabase activo."
